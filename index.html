<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabla con Tres Columnas</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>Listado de Ejemplo</h1>
        <table>
            <thead>
                <tr>
                    <th>Número</th>
                    <th>Nombre</th>
                    <th>Enlace</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>1</td>
                    <td>Gabriel</td>
                    <td><a href="https://example.com">Visitar</a></td>
                </tr>
                <tr>
                    <td>2</td>
                    <td>Ana</td>
                    <td><a href="https://example.com">Visitar</a></td>
                </tr>
                <tr>
                    <td>3</td>
                    <td>Modificado</td>
                    <td>actualizado</td>
                </tr>
                <tr>
                    <td>12</td>
                    <td>Nombre completo</td>
                    <td><a href="./nombre.html">Visitar</a></td>
                </tr>
            </tbody>
        </table>
    </div>
</body>
</html>
